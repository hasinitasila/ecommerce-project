<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — KART</title>
    <meta name="description" content="Browse our curated collection of premium products at unbeatable prices on KART.">
    <link rel="stylesheet" href="styles.css">
    <style>
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-lg) var(--space-lg) 0;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .results-count {
            font-size: 14px;
            color: var(--text-muted);
        }

        .results-count span {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="/" class="navbar-brand">
            <span class="brand-icon">🛒</span> KART
        </a>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search-input" placeholder="Search products...">
        </div>
        <ul class="navbar-links">
            <li><a href="/products.html" class="active" id="nav-products">Products</a></li>
            <li><a href="/wishlist.html" id="nav-wishlist">♡ Wishlist</a></li>
            <li><a href="/cart.html" id="nav-cart">🛒 Cart</a></li>
        </ul>
        <div class="navbar-actions">
            <span class="navbar-user">Hello, <span id="user-greeting">User</span></span>
            <button class="btn btn-sm btn-secondary" id="logout-btn">Sign Out</button>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Our Products</h1>
        <p>Curated picks, unbeatable prices</p>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="results-count" id="results-count"></div>
    </div>

    <!-- Product Grid -->
    <div class="product-grid stagger" id="product-container"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            toast.className = 'toast toast-' + type;
            toast.innerHTML = '<span>' + (icons[type] || '') + '</span> ' + message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const productContainer = document.getElementById('product-container');
            const searchInput = document.getElementById('search-input');
            const resultsCount = document.getElementById('results-count');

            // Auth check
            try {
                const meRes = await fetch('/me');
                if (!meRes.ok) {
                    window.location.href = '/login';
                    return;
                }
                const meData = await meRes.json();
                document.getElementById('user-greeting').textContent = meData.username;
            } catch {
                window.location.href = '/login';
                return;
            }

            // Logout
            document.getElementById('logout-btn').addEventListener('click', async () => {
                await fetch('/logout', { method: 'POST' });
                window.location.href = '/login';
            });

            // Show skeleton loaders
            let skeletonHTML = '';
            for (let i = 0; i < 8; i++) {
                skeletonHTML += '<div class="skeleton-card animate-in"><div class="skeleton skeleton-image"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div><div class="skeleton skeleton-text-sm"></div></div>';
            }
            productContainer.innerHTML = skeletonHTML;

            // Fetch products
            let allProducts = [];
            try {
                const response = await fetch('/products');
                if (!response.ok) throw new Error('Failed to fetch');
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                productContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h2>Failed to load products</h2><p>Please try again later.</p></div>';
            }

            // Search
            searchInput.addEventListener('input', () => {
                const query = searchInput.value.toLowerCase().trim();
                if (!query) {
                    renderProducts(allProducts);
                    return;
                }
                const filtered = allProducts.filter(p =>
                    (p.name && p.name.toLowerCase().includes(query)) ||
                    (p.description && p.description.toLowerCase().includes(query))
                );
                renderProducts(filtered);
            });

            function renderProducts(products) {
                productContainer.innerHTML = '';
                resultsCount.innerHTML = '<span>' + products.length + '</span> product' + (products.length !== 1 ? 's' : '') + ' found';

                if (products.length === 0) {
                    productContainer.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h2>No products found</h2><p>Try a different search term.</p></div>';
                    return;
                }

                products.forEach(product => {
                    const img = product.image || 'https://via.placeholder.com/300x220/1a1a2e/d4a853?text=No+Image';
                    const desc = product.description || 'No description available.';
                    const shortDesc = desc.length > 80 ? desc.substring(0, 80) + '...' : desc;
                    const retail = parseFloat(product.retailPrice) || 0;
                    const discounted = parseFloat(product.discountedPrice) || 0;
                    const discount = retail > 0 ? Math.round(((retail - discounted) / retail) * 100) : 0;

                    const card = document.createElement('div');
                    card.className = 'product-card animate-in';
                    card.innerHTML =
                        '<div class="image-wrapper">' +
                            '<img class="card-image" src="' + img + '" alt="' + (product.name || 'Product') + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/300x220/1a1a2e/d4a853?text=No+Image\'">' +
                        '</div>' +
                        '<div class="card-body">' +
                            '<h3 class="card-title">' + (product.name || 'Unnamed Product') + '</h3>' +
                            '<p class="card-description">' + shortDesc + '</p>' +
                            '<div class="card-price">' +
                                '<span class="price-current">₹' + discounted.toFixed(2) + '</span>' +
                                (retail > discounted ? '<span class="price-original">₹' + retail.toFixed(2) + '</span>' : '') +
                                (discount > 0 ? '<span class="price-badge">' + discount + '% OFF</span>' : '') +
                            '</div>' +
                        '</div>' +
                        '<div class="card-actions">' +
                            '<button class="btn btn-secondary btn-wishlist" data-id="' + product.id + '">♡ Wishlist</button>' +
                            '<button class="btn btn-primary btn-cart" data-id="' + product.id + '">+ Cart</button>' +
                        '</div>';

                    productContainer.appendChild(card);
                });

                // Attach event listeners
                document.querySelectorAll('.btn-wishlist').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        try {
                            const res = await fetch('/add-to-wishlist/' + id, { method: 'POST' });
                            const data = await res.json();
                            showToast(data.message || 'Added to wishlist!');
                        } catch { showToast('Failed to add to wishlist', 'error'); }
                    });
                });

                document.querySelectorAll('.btn-cart').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        try {
                            const res = await fetch('/add-to-cart/' + id, { method: 'POST' });
                            const data = await res.json();
                            showToast(data.message || 'Added to cart!');
                        } catch { showToast('Failed to add to cart', 'error'); }
                    });
                });
            }
        });
    </script>
</body>
</html>

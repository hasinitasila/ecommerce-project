<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — KART</title>
    <meta name="description" content="Create your KART account to start shopping premium products at great prices.">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: var(--space-xl);
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 50% 40% at 50% 0%, rgba(212, 168, 83, 0.06) 0%, transparent 60%);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s var(--ease-out) both;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .auth-brand a {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .auth-form-card {
            padding: var(--space-xl) var(--space-xl) var(--space-lg);
        }

        .auth-form-card h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: var(--space-xs);
        }

        .auth-form-card .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: var(--space-xl);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-lg);
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            font-weight: 600;
        }

        .error-banner {
            background: var(--danger-bg);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: var(--space-lg);
            display: none;
        }

        .error-banner.visible {
            display: block;
            animation: fadeInUp 0.3s var(--ease-out);
        }

        .password-strength {
            height: 3px;
            border-radius: 2px;
            margin-top: var(--space-sm);
            transition: all var(--duration-fast);
            background: var(--bg-glass);
        }

        .password-strength .bar {
            height: 100%;
            border-radius: 2px;
            transition: all var(--duration-normal) var(--ease-out);
            width: 0%;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <a href="/">KART</a>
            </div>
            <div class="glass-card auth-form-card">
                <h1>Create account</h1>
                <p class="subtitle">Join KART and start exploring</p>
                <div class="error-banner" id="error-banner"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-input" type="text" id="username" name="username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-input" type="password" id="password" name="password" placeholder="Create a strong password" required>
                        <div class="password-strength"><div class="bar" id="strength-bar"></div></div>
                        <div class="strength-text" id="strength-text"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="btn-register">Create Account</button>
                </form>
                <div class="auth-footer">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password strength indicator
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { width: '0%', color: 'transparent', text: '' },
                { width: '20%', color: '#f87171', text: 'Very weak' },
                { width: '40%', color: '#fb923c', text: 'Weak' },
                { width: '60%', color: '#fbbf24', text: 'Fair' },
                { width: '80%', color: '#a3e635', text: 'Strong' },
                { width: '100%', color: '#34d399', text: 'Very strong' }
            ];

            const level = levels[score];
            strengthBar.style.width = level.width;
            strengthBar.style.background = level.color;
            strengthText.textContent = level.text;
            strengthText.style.color = level.color;
        });

        // Form submission
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBanner = document.getElementById('error-banner');
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !email || !password) {
                errorBanner.textContent = 'Please fill in all fields.';
                errorBanner.classList.add('visible');
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/products.html';
                } else {
                    errorBanner.textContent = data.error || 'Registration failed.';
                    errorBanner.classList.add('visible');
                }
            } catch (err) {
                errorBanner.textContent = 'Something went wrong. Please try again.';
                errorBanner.classList.add('visible');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — KART</title>
    <meta name="description" content="Review items in your shopping cart on KART.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="brand-icon">🛒</span> KART
        </a>
        <ul class="navbar-links">
            <li><a href="/products.html" id="nav-products">Products</a></li>
            <li><a href="/wishlist.html" id="nav-wishlist">♡ Wishlist</a></li>
            <li><a href="/cart.html" class="active" id="nav-cart">🛒 Cart</a></li>
        </ul>
        <div class="navbar-actions">
            <button class="btn btn-sm btn-secondary" id="logout-btn">Sign Out</button>
        </div>
    </nav>

    <div class="page-header">
        <h1>Your Cart</h1>
        <p>Review your items and checkout</p>
    </div>

    <div class="list-container">
        <div id="cart-container"></div>
        <div id="summary-section" style="display:none;">
            <div class="summary-card">
                <div class="summary-row">
                    <span class="label">Subtotal</span>
                    <span class="value" id="subtotal">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span class="label">Shipping</span>
                    <span class="value" style="color: var(--success);">Free</span>
                </div>
                <div class="summary-row total">
                    <span class="label">Total</span>
                    <span class="value" id="total-amount">₹0.00</span>
                </div>
                <button class="btn btn-primary btn-lg mt-lg" style="width:100%;" id="buy-now-btn">Place Order</button>
                <a href="/products.html" class="btn btn-secondary mt-md" style="width:100%;text-align:center;">Continue Shopping</a>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal">
            <h2>Confirm Order</h2>
            <p>Are you sure you want to place this order? Your cart will be cleared and the order will be processed.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm Order</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            toast.className = 'toast toast-' + type;
            toast.innerHTML = '<span>' + (icons[type] || '') + '</span> ' + message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            const meRes = await fetch('/me');
            if (!meRes.ok) { window.location.href = '/login'; return; }

            // Logout
            document.getElementById('logout-btn').addEventListener('click', async () => {
                await fetch('/logout', { method: 'POST' });
                window.location.href = '/login';
            });

            await loadCart();

            // Buy Now with modal
            document.getElementById('buy-now-btn').addEventListener('click', () => {
                document.getElementById('confirm-modal').classList.add('active');
            });

            document.getElementById('modal-cancel').addEventListener('click', () => {
                document.getElementById('confirm-modal').classList.remove('active');
            });

            document.getElementById('confirm-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
            });

            document.getElementById('modal-confirm').addEventListener('click', async () => {
                document.getElementById('confirm-modal').classList.remove('active');
                try {
                    const res = await fetch('/buy-now', { method: 'POST' });
                    const data = await res.json();
                    if (res.ok) {
                        showToast('Order placed successfully! 🎉');
                        await loadCart();
                    } else {
                        showToast(data.error || 'Failed to place order.', 'error');
                    }
                } catch { showToast('Something went wrong.', 'error'); }
            });
        });

        async function loadCart() {
            const cartContainer = document.getElementById('cart-container');
            const summarySection = document.getElementById('summary-section');

            try {
                const response = await fetch('/cart');
                if (!response.ok) throw new Error('Server error');
                const data = await response.json();

                if (!Array.isArray(data) || data.length === 0) {
                    cartContainer.innerHTML =
                        '<div class="empty-state">' +
                            '<div class="empty-icon">🛒</div>' +
                            '<h2>Your cart is empty</h2>' +
                            '<p>Looks like you haven\'t added anything yet.</p>' +
                            '<a href="/products.html" class="btn btn-primary">Browse Products</a>' +
                        '</div>';
                    summarySection.style.display = 'none';
                    return;
                }

                summarySection.style.display = 'block';
                let totalAmount = 0;
                cartContainer.innerHTML = '';

                data.forEach(item => {
                    let imageUrl = item.image || '';
                    try {
                        const parsed = JSON.parse(imageUrl);
                        if (Array.isArray(parsed)) imageUrl = parsed[0] || '';
                    } catch {}

                    const price = parseFloat(item.discounted_price) || parseFloat(item.retail_price) || 0;
                    const lineTotal = price * item.quantity;
                    totalAmount += lineTotal;

                    const div = document.createElement('div');
                    div.className = 'cart-item animate-in';
                    div.innerHTML =
                        '<img src="' + (imageUrl || 'https://via.placeholder.com/90/1a1a2e/d4a853?text=No+Img') + '" alt="' + item.product_name + '" onerror="this.src=\'https://via.placeholder.com/90/1a1a2e/d4a853?text=No+Img\'">' +
                        '<div class="cart-item-info">' +
                            '<h3>' + item.product_name + '</h3>' +
                            '<span class="item-price">₹' + price.toFixed(2) + '</span>' +
                        '</div>' +
                        '<div class="quantity-control">' +
                            '<button class="qty-dec" data-id="' + item.uniq_id + '">−</button>' +
                            '<span class="qty-value">' + item.quantity + '</span>' +
                            '<button class="qty-inc" data-id="' + item.uniq_id + '">+</button>' +
                        '</div>' +
                        '<button class="btn btn-danger btn-icon btn-remove" data-id="' + item.uniq_id + '" title="Remove">✕</button>';

                    cartContainer.appendChild(div);
                });

                document.getElementById('subtotal').textContent = '₹' + totalAmount.toFixed(2);
                document.getElementById('total-amount').textContent = '₹' + totalAmount.toFixed(2);

                // Quantity controls
                document.querySelectorAll('.qty-inc').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        await fetch('/cart/' + btn.dataset.id, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'increment' })
                        });
                        await loadCart();
                    });
                });

                document.querySelectorAll('.qty-dec').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        await fetch('/cart/' + btn.dataset.id, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'decrement' })
                        });
                        await loadCart();
                    });
                });

                // Remove
                document.querySelectorAll('.btn-remove').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        await fetch('/cart/' + btn.dataset.id, { method: 'DELETE' });
                        showToast('Item removed from cart');
                        await loadCart();
                    });
                });
            } catch (error) {
                cartContainer.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h2>Failed to load cart</h2><p>Please try again later.</p></div>';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KART — Discover Premium. Shop Effortlessly.</title>
    <meta name="description"
        content="KART is a premium e-commerce platform offering the best deals on fashion, electronics, home goods and more.">
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(212, 168, 83, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 80% 100%, rgba(212, 168, 83, 0.05) 0%, transparent 50%);
        }

        .hero-content {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: var(--space-xl);
            animation: fadeInUp 0.8s var(--ease-out) both;
        }

        .hero-logo {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 16px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: var(--space-md);
            text-shadow: 0 0 60px var(--accent-glow);
        }

        .hero-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: var(--space-lg) auto;
        }

        .hero-tagline {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto var(--space-2xl);
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-actions .btn {
            min-width: 180px;
            padding: 16px 36px;
            font-size: 15px;
            letter-spacing: 1px;
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.2;
            }

            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        .footer-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <section class="hero">
        <div class="particles" id="particles"></div>
        <div class="hero-content">
            <div class="hero-logo">KART</div>
            <div class="hero-divider"></div>
            <div class="hero-actions">
                <a href="/login" class="btn btn-primary btn-lg" id="btn-signin">Sign In</a>
                <a href="/register" class="btn btn-outline btn-lg" id="btn-register">Create Account</a>
            </div>
        </div>
        <div class="footer-hint">Scroll to explore</div>
    </section>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 8 + 6) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            container.appendChild(p);
        }
    </script>
</body>

</html>
